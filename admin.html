<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Admin - Deepfake Defender</title><meta name="viewport" content="width=device-width,initial-scale=1">
<style>:root{--line:rgba(148,163,184,.18);--text:#f8fafc;--muted:#94a3b8;--accent:#10b981;--cyan:#06b6d4;--danger:#ef4444}*{box-sizing:border-box;font-family:Segoe UI,system-ui,Arial,sans-serif}body{margin:0;color:var(--text);background:linear-gradient(180deg,#0a0e27,#050812);min-height:100vh}.wrap{max-width:1220px;margin:30px auto;padding:0 18px}header{border-bottom:1px solid var(--line);background:rgba(5,8,18,.78);backdrop-filter:blur(18px)}.h{max-width:1220px;margin:auto;padding:16px 22px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;gap:12px;color:var(--text);text-decoration:none}.brand img{width:44px;height:44px}.brand h1{margin:0;font-size:18px}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.nav{color:var(--text);text-decoration:none;border:1px solid var(--line);padding:10px 14px;border-radius:10px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card{padding:20px;border:1px solid var(--line);border-radius:18px;background:rgba(15,23,42,.86);box-shadow:0 16px 50px rgba(0,0,0,.3);margin-bottom:16px}.metric{font-size:28px;font-weight:900;color:#5eead4}.muted{color:var(--muted)}table{width:100%;border-collapse:collapse;font-size:13px}td,th{border-bottom:1px solid var(--line);padding:10px;text-align:left}button{border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.05);color:var(--text);padding:8px 10px;cursor:pointer}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}</style></head>
<body><header><div class="h"><a class="brand" href="index.html"><img src="/static/logo11.png" alt=""><span><h1>Deepfake Defender</h1><p>Admin console</p></span></a><a class="nav" href="index.html">Back to App</a></div></header>
<main class="wrap"><section class="grid" id="metrics"></section><section class="card"><h2>Users</h2><div id="users">Loading...</div></section><section class="card"><h2>Usage History</h2><div id="history">Loading...</div></section><section class="card"><h2>IP Usage</h2><div id="ips">Loading...</div></section></main>
<script>
async function api(url,opts){const r=await fetch(url,opts);const d=await r.json().catch(()=>({error:"Bad response"}));if(!r.ok){throw new Error(d.error||"Request failed")}return d}
function table(headers,rows){return `<table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.join("")}</tbody></table>`}
async function load(){try{const s=await api("/api/admin/summary");metrics.innerHTML=Object.entries(s.counts).map(([k,v])=>`<div class="card"><div class="metric">${v}</div><div class="muted">${k.replaceAll("_"," ")}</div></div>`).join("");
const u=await api("/api/admin/users");users.innerHTML=table(["Name","Email","Role","Status","Actions"],u.users.map(x=>`<tr><td>${x.name}</td><td>${x.email}</td><td>${x.role}</td><td>${x.is_active?"Active":"Blocked"}</td><td><button onclick="toggleUser(${x.id},${!x.is_active})">${x.is_active?"Block":"Unblock"}</button></td></tr>`));
const h=await api("/api/admin/history");history.innerHTML=table(["File","Mode","Result","IP","Time"],h.history.slice(0,30).map(x=>`<tr><td>${x.file_name}</td><td>${x.mode}</td><td>${x.result_label}</td><td>${x.client_ip||""}</td><td>${new Date(x.created_at).toLocaleString()}</td></tr>`));
const ip=await api("/api/admin/ip-usage");ips.innerHTML=table(["IP","Count","Blocked","Actions"],ip.ip_usage.map(x=>`<tr><td>${x.client_ip}</td><td>${x.free_video_count}</td><td>${x.blocked}</td><td><button onclick="resetIp('${x.client_ip}')">Reset</button> <button onclick="blockIp('${x.client_ip}',${!x.blocked})">${x.blocked?"Unblock":"Block"}</button></td></tr>`));
}catch(e){document.body.innerHTML=`<main class="wrap"><section class="card"><h2>Admin access required</h2><p class="muted">${e.message}</p><a class="nav" href="login.html">Login</a></section></main>`}}
async function toggleUser(id,active){await api(`/api/admin/users/${id}/active`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({is_active:active})});load()}
async function resetIp(ip){await api(`/api/admin/ip-usage/${encodeURIComponent(ip)}/reset`,{method:"POST"});load()}
async function blockIp(ip,blocked){await api(`/api/admin/ip-usage/${encodeURIComponent(ip)}/block`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({blocked})});load()}
load();
</script></body></html>
