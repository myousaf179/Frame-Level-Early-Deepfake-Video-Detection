<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Profile - Deepfake Defender</title><meta name="viewport" content="width=device-width,initial-scale=1">
<style>:root{--line:rgba(148,163,184,.18);--text:#f8fafc;--muted:#94a3b8;--accent:#10b981;--cyan:#06b6d4;--danger:#ef4444}*{box-sizing:border-box;font-family:Segoe UI,system-ui,Arial,sans-serif}body{margin:0;color:var(--text);background:linear-gradient(180deg,#0a0e27,#050812);min-height:100vh}.wrap{max-width:1100px;margin:36px auto;padding:0 18px}header{border-bottom:1px solid var(--line);background:rgba(5,8,18,.78);backdrop-filter:blur(18px)}.h{max-width:1100px;margin:auto;padding:16px 22px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;gap:12px;color:var(--text);text-decoration:none}.brand img{width:44px;height:44px}.brand h1{margin:0;font-size:18px}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.nav{color:var(--text);text-decoration:none;border:1px solid var(--line);padding:10px 14px;border-radius:10px}.grid{display:grid;grid-template-columns:360px 1fr;gap:20px}.card{padding:24px;border:1px solid var(--line);border-radius:18px;background:rgba(15,23,42,.86);box-shadow:0 16px 50px rgba(0,0,0,.3)}.muted{color:var(--muted)}input{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);padding:12px;border-radius:12px}.btn{border:0;border-radius:12px;padding:12px 14px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--accent),var(--cyan));cursor:pointer;margin-top:12px}.history{display:grid;gap:12px}.row{padding:14px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.03)}@media(max-width:820px){.grid{grid-template-columns:1fr}}</style></head>
<body><header><div class="h"><a class="brand" href="index.html"><img src="/static/logo11.png" alt=""><span><h1>Deepfake Defender</h1><p>User profile</p></span></a><a class="nav" href="index.html">Back to App</a></div></header>
<main class="wrap"><div class="grid"><section class="card"><h2>Profile</h2><p class="muted" id="email">Loading...</p><label>Name</label><input id="name"><button class="btn" id="save">Save Profile</button><button class="btn" id="logout" style="background:linear-gradient(135deg,#ef4444,#dc2626)">Logout</button><p class="muted" id="msg"></p></section><section class="card"><h2>Analysis History</h2><div class="history" id="history">Loading...</div></section></div></main>
<script>async function load(){const r=await fetch("/api/auth/profile");const d=await r.json();if(!r.ok){location.href="login.html";return}name.value=d.user.name;email.textContent=d.user.email+" • "+d.user.role;history.innerHTML=(d.history||[]).map(h=>`<div class="row"><strong>${h.file_name}</strong><div class="muted">${h.mode} • ${h.result_label} • fake ${h.fake_count} / real ${h.real_count}</div><div class="muted">${new Date(h.created_at).toLocaleString()}</div></div>`).join("")||'<p class="muted">No analyses yet.</p>'}save.onclick=async()=>{const r=await fetch("/api/auth/profile",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:name.value})});const d=await r.json();msg.textContent=d.message||d.error||""};logout.onclick=async()=>{await fetch("/api/auth/logout",{method:"POST"});location.href="index.html"};load();</script></body></html>
