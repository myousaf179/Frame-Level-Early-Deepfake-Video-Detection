<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Forgot Password - Deepfake Defender</title><meta name="viewport" content="width=device-width,initial-scale=1">
<style>:root{--line:rgba(148,163,184,.18);--text:#f8fafc;--muted:#94a3b8;--accent:#10b981;--cyan:#06b6d4;--danger:#ef4444}*{box-sizing:border-box;font-family:Segoe UI,system-ui,Arial,sans-serif}body{margin:0;min-height:100vh;color:var(--text);background:linear-gradient(180deg,#0a0e27,#050812)}header{border-bottom:1px solid var(--line);background:rgba(5,8,18,.78);backdrop-filter:blur(18px)}.h{max-width:1100px;margin:auto;padding:16px 22px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;gap:12px;color:var(--text);text-decoration:none}.brand img{width:44px;height:44px}.brand h1{margin:0;font-size:18px}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.nav{color:var(--text);text-decoration:none;border:1px solid var(--line);padding:10px 14px;border-radius:10px}.card{max-width:460px;margin:58px auto;padding:30px;border:1px solid var(--line);border-radius:22px;background:rgba(15,23,42,.86);box-shadow:0 20px 70px rgba(0,0,0,.38)}h2{margin:0 0 8px}.sub{color:var(--muted);line-height:1.6}label{display:block;margin:18px 0 8px;color:#dbeafe;font-weight:650;font-size:13px}input{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);padding:13px;border-radius:12px}.btn{width:100%;border:0;border-radius:12px;padding:13px;margin-top:18px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--accent),var(--cyan));cursor:pointer}.msg{display:none;margin-top:14px;padding:12px;border-radius:12px;border:1px solid;font-size:13px}.msg.error{display:block;color:#fecaca;background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35)}.msg.success{display:block;color:#bbf7d0;background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.35)}a{color:#5eead4}</style></head>
<body><header><div class="h"><a class="brand" href="index.html"><img src="/static/logo11.png" alt=""><span><h1>Deepfake Defender</h1><p>Password recovery</p></span></a><a class="nav" href="login.html">Back to Login</a></div></header>
<main class="card"><h2>Reset your password</h2><p class="sub">Enter your email. If SMTP is configured, we will send a secure reset link. In development, a safe test link is shown here.</p>
<form id="form"><label>Email Address</label><input id="email" type="email" required placeholder="you@example.com"><button class="btn">Send Reset Link</button><div id="msg" class="msg"></div></form></main>
<script>const msg=document.getElementById("msg");function show(t,c="error"){msg.className="msg "+c;msg.innerHTML=t}form.addEventListener("submit",async e=>{e.preventDefault();show("Checking account...","success");const r=await fetch("/api/auth/forgot-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email.value.trim()})});const d=await r.json();if(!r.ok||!d.ok){show(d.error||"Request failed");return}let html=d.message||"If the email exists, a reset link has been sent.";if(d.dev_reset_url){html+=`<br><br><strong>Development reset link:</strong><br><a href="${d.dev_reset_url}">${d.dev_reset_url}</a>`}show(html,"success")});</script></body></html>
