<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Reset Password - Deepfake Defender</title><meta name="viewport" content="width=device-width,initial-scale=1">
<style>:root{--line:rgba(148,163,184,.18);--text:#f8fafc;--muted:#94a3b8;--accent:#10b981;--cyan:#06b6d4;--danger:#ef4444}*{box-sizing:border-box;font-family:Segoe UI,system-ui,Arial,sans-serif}body{margin:0;min-height:100vh;color:var(--text);background:linear-gradient(180deg,#0a0e27,#050812)}.card{max-width:450px;margin:70px auto;padding:30px;border:1px solid var(--line);border-radius:22px;background:rgba(15,23,42,.9);box-shadow:0 20px 70px rgba(0,0,0,.38)}h2{margin:0 0 8px}.sub{color:var(--muted)}label{display:block;margin:18px 0 8px;color:#dbeafe;font-weight:650;font-size:13px}input{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);padding:13px;border-radius:12px}.btn{width:100%;border:0;border-radius:12px;padding:13px;margin-top:18px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--accent),var(--cyan));cursor:pointer}.msg{display:none;margin-top:14px;padding:12px;border-radius:12px;border:1px solid;font-size:13px}.msg.error{display:block;color:#fecaca;background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35)}.msg.success{display:block;color:#bbf7d0;background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.35)}a{color:#5eead4}</style></head>
<body><main class="card"><h2>Choose a new password</h2><p class="sub">Use the secure link from your password recovery request.</p><form id="form"><label>New Password</label><input id="password" type="password" required minlength="8"><label>Confirm Password</label><input id="confirm" type="password" required minlength="8"><button class="btn">Reset Password</button><div id="msg" class="msg"></div></form></main>
<script>const token=new URLSearchParams(location.search).get("token")||"";const msg=document.getElementById("msg");function show(t,c="error"){msg.className="msg "+c;msg.innerHTML=t}if(!token)show("Missing reset token. Request a new reset link from the forgot password page.");form.addEventListener("submit",async e=>{e.preventDefault();if(password.value!==confirm.value){show("Passwords do not match.");return}const r=await fetch("/api/auth/reset-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,password:password.value})});const d=await r.json();if(!r.ok||!d.ok){show(d.error||"Reset failed.");return}show('Password reset successfully. <a href="login.html">Sign in now</a>.',"success")});</script></body></html>
